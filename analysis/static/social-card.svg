<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c0e11"/>
      <stop offset="100%" stop-color="#151920"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#bg)"/>
  <rect x="0" y="0" width="1200" height="4" fill="#fce28f"/>

  <!-- Title -->
  <text x="80" y="120" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#f2f0ec">Predictive History Audit</text>
  <text x="80" y="165" font-family="Helvetica, Arial, sans-serif" font-size="22" fill="#a09882">Systematic Content Analysis of Jiang Xueqin (&#x6C5F;&#x5B66;&#x52E4;)</text>

  <!-- Stats -->
  <text x="80" y="250" font-family="monospace" font-size="56" font-weight="bold" fill="#fce28f">140</text>
  <text x="260" y="250" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a09882">lectures analyzed</text>

  <text x="80" y="320" font-family="monospace" font-size="56" font-weight="bold" fill="#fce28f">36.7%</text>
  <text x="310" y="320" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a09882">prediction calibration (51/139 resolved)</text>

  <text x="80" y="390" font-family="monospace" font-size="56" font-weight="bold" fill="#fce28f">593</text>
  <text x="260" y="390" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#a09882">predictions &amp; claims tracked</text>

  <!-- Framing callout -->
  <rect x="700" y="220" width="420" height="180" rx="4" fill="#1a1f28" stroke="#2e3440" stroke-width="1"/>
  <text x="730" y="258" font-family="Helvetica, Arial, sans-serif" font-size="14" font-weight="bold" fill="#a09882" letter-spacing="2">CIVILIZATIONAL FRAMING</text>
  <text x="730" y="300" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#94f4c6">China: 26.8% favorable</text>
  <text x="730" y="335" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#ffbbbb">US/West: 54.2% critical</text>
  <text x="730" y="370" font-family="Helvetica, Arial, sans-serif" font-size="20" fill="#94f4c6">Russia: 40.8% favorable</text>

  <!-- Footer -->
  <rect x="0" y="560" width="1200" height="40" fill="#0a0c0f"/>
  <text x="80" y="586" font-family="Helvetica, Arial, sans-serif" font-size="14" fill="#6b6355">Data, not diatribe &#x2022; AI-assisted analysis by Claude Opus 4.6</text>
