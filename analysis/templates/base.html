<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Predictive History Audit{% endblock %}</title>
  <meta name="description" content="{% block description %}Systematic, AI-assisted content analysis of 140 Predictive History YouTube lectures across seven qualitative axes.{% endblock %}">

  <!-- Open Graph (Facebook, LinkedIn, Discord, etc.) -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="{% block og_title %}Predictive History Audit{% endblock %}">
  <meta property="og:description" content="{% block og_description %}Systematic, AI-assisted content analysis of 140 Predictive History YouTube lectures across seven qualitative axes.{% endblock %}">
  <meta property="og:image" content="{% block og_image %}https://predictivehistoryaudit.pages.dev/static/social-card.png{% endblock %}">
  <meta property="og:url" content="{% block og_url %}{% endblock %}">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="600">
  <meta property="og:site_name" content="Predictive History Audit">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{% block tw_title %}Predictive History Audit{% endblock %}">
  <meta name="twitter:description" content="{% block tw_description %}Systematic, AI-assisted content analysis of 140 Predictive History YouTube lectures across seven qualitative axes.{% endblock %}">
  <meta name="twitter:image" content="{% block tw_image %}https://predictivehistoryaudit.pages.dev/static/social-card.png{% endblock %}">

  <link rel="icon" type="image/svg+xml" href="{{ root }}static/favicon.svg">
  <link rel="stylesheet" href="{{ root }}static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <script src="{{ root }}static/charts.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>

  <header class="masthead">
    <div class="container masthead-inner">
      <div class="masthead-brand">
        <a href="{{ root }}index.html" class="masthead-title">Predictive History Audit</a>
        <span class="masthead-separator">/</span>
        <span class="masthead-subtitle">Systematic Content Analysis</span>
      </div>
      <nav class="masthead-nav">
        <a href="{{ root }}index.html" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ root }}briefing.html" class="{% if page == 'briefing' %}active{% endif %}">Briefing</a>
        <a href="{{ root }}methodology.html" class="{% if page == 'methodology' %}active{% endif %}">Methodology</a>
        <a href="{{ root }}patterns.html" class="{% if page == 'patterns' %}active{% endif %}">Patterns</a>
        <a href="{{ root }}channel.html" class="{% if page == 'channel' %}active{% endif %}">Channel</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-text">Analysis performed by Claude Opus 4.6 &middot; Schema v1.0</span>
      <span class="footer-text">Data, not diatribe &middot; <a href="{{ root }}methodology.html#fair-use" style="color: var(--text-muted);">Fair Use</a></span>
    </div>
  </footer>

</body>
</html>
