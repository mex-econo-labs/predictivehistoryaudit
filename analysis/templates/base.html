<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Predictive History Audit{% endblock %}</title>
  <meta name="description" content="Systematic, AI-assisted content analysis of 131 Predictive History YouTube lectures across seven qualitative axes.">
  <link rel="icon" type="image/svg+xml" href="{{ root }}static/favicon.svg">
  <link rel="stylesheet" href="{{ root }}static/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js" defer></script>
  <script src="{{ root }}static/charts.js" defer></script>
  {% block head %}{% endblock %}
</head>
<body>

  <header class="masthead">
    <div class="container masthead-inner">
      <div class="masthead-brand">
        <a href="{{ root }}index.html" class="masthead-title">Predictive History Audit</a>
        <span class="masthead-separator">/</span>
        <span class="masthead-subtitle">Systematic Content Analysis</span>
      </div>
      <nav class="masthead-nav">
        <a href="{{ root }}index.html" class="{% if page == 'dashboard' %}active{% endif %}">Dashboard</a>
        <a href="{{ root }}methodology.html" class="{% if page == 'methodology' %}active{% endif %}">Methodology</a>
        <a href="{{ root }}patterns.html" class="{% if page == 'patterns' %}active{% endif %}">Patterns</a>
        <a href="{{ root }}briefing.html" class="{% if page == 'briefing' %}active{% endif %}">Briefing</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <span class="footer-text">Analysis performed by Claude Opus 4.6 &amp; GPT-4 &middot; Schema v1.0</span>
      <span class="footer-text">Data, not diatribe</span>
    </div>
  </footer>

</body>
</html>
